name: Nightly Test Suite

on:
  schedule:
    # 23:00 UTC = 17:00 CST (5pm Central)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      budget:
        description: 'Example budget tier (default: high for nightly)'
        type: choice
        default: 'high'
        options: [low, medium, high]
      skip_examples:
        description: 'Skip example tests (LLM calls)'
        type: boolean
        default: false
      skip_server:
        description: 'Skip server tests'
        type: boolean
        default: false
      skip_client:
        description: 'Skip client/browser tests'
        type: boolean
        default: false

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  gate:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif git log --since='24 hours ago' --oneline | head -1 | grep -q .; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "No changes in 24h — skipping"
          fi

  server:
    name: Server
    needs: gate
    if: |
      needs.gate.outputs.should_run == 'true' &&
      github.event.inputs.skip_server != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm test -- --run 2>&1 | tee results.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server
          path: results.txt

  client:
    name: Client
    needs: gate
    if: |
      needs.gate.outputs.should_run == 'true' &&
      github.event.inputs.skip_client != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run test:browser -- --run 2>&1 | tee results.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client
          path: results.txt

  examples:
    name: Examples (${{ matrix.budget }})
    needs: gate
    if: |
      needs.gate.outputs.should_run == 'true' &&
      github.event.inputs.skip_examples != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        budget: [low, medium, high]
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      EXAMPLE_BUDGET: ${{ matrix.budget }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npx vitest run --config vitest.config.examples.js --reporter=verbose 2>&1 | tee results.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: examples-${{ matrix.budget }}
          path: results.txt

  notify:
    name: Send report
    needs: [gate, server, client, examples]
    if: always() && needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: Build and send report
        env:
          SERVER_RESULT: ${{ needs.server.result }}
          CLIENT_RESULT: ${{ needs.client.result }}
          EXAMPLES_RESULT: ${{ needs.examples.result }}
          ARTIFACTS_DIR: artifacts
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: ./scripts/nightly-report.sh
